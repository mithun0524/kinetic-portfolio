        <p>
          I am a full-stack AI engineer based in Bangalore, India. I build AI agents, developer

        <h2>About</h2>
        <p>
          I like building things that actually ship. Mostly AI agents, developer tools and web apps

        <h2>Selected Work</h2>
        <h3>Crayon — AI Coding Agent (2026)</h3>
        <p>
          Crayon is an AI coding agent that lives in your terminal and VS Code. It plans the work,
          runs the commands, and fixes its own broken builds. It indexes your codebase locally and
          lets you swap between Claude, GPT and local Ollama models. Built with TypeScript, Ink
          and LLM agent orchestration patterns. Crayon uses tree-sitter for code analysis and
          supports multi-file editing with automatic error recovery.
        </p>
        <h3>DevForge — AI Code Editor (2026)</h3>
        <p>
          DevForge is an AI code editor that runs entirely in your browser. It spins up a real Node
          environment using WebContainers, generates whole applications with live preview, and needs
          no backend at all. Built with Next.js, React 19, TypeScript and WebContainers. DevForge
          lets you go from a prompt to a running application in seconds, all without leaving
          your browser tab.
        </p>
        <h3>AdaptIQ — Adaptive Learning Platform (2026)</h3>
        <p>
          AdaptIQ is a maths practice app that adapts to each student using Item Response Theory.
          It reads how the student is doing and adjusts the difficulty in real time, drops in hints
          when they get stuck, and tracks progress across NCERT topics. Built with TypeScript,
          IRT algorithms and AI tutoring. The platform provides personalised learning paths and
          detailed analytics for both students and teachers.
        </p>
        <h3>InterPrep — AI Mock Interviews (2025)</h3>
        <p>
          InterPrep lets you practice interviews out loud with an AI. It runs technical and
          behavioral rounds by voice, scores you right after, and keeps every session so you can
          look back on how you did. Built with Next.js, Voice AI and Firebase. InterPrep covers
          data structures, algorithms, system design and behavioral interview questions.
        </p>

        <h2>Capabilities</h2>
        <p>

          prompt engineering, React and Next.js front-end development, TypeScript and JavaScript,
          FastAPI and Python back-end development, WebContainers and browser-based runtimes,
          GSAP and Framer Motion animations, Supabase and Firebase databases, and Computer Vision
          with OpenCV. I also work with OpenRouter, Ollama, Tree-sitter, SQLite, Tailwind CSS,
